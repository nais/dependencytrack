name: Build and deploy Bootstrap
on:
  push:
    branches:
      - main
    paths-ignore:
      - "*.md"
      - "LICENSE.md"
  pull_request:
    types: [opened, reopened, synchronize]
    paths-ignore:
      - "*.md"
      - "LICENSE.md"
env:
  NAME: dependencytrack
  FEATURE_REPOSITORY: oci://europe-north1-docker.pkg.dev/nais-io/nais/feature

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    permissions:
      contents: "read"
    strategy:
      fail-fast: false
      matrix:
        mise-task:
          - check:deadcode
          - check:gofix
          - check:goimport
          - check:govet
          - check:gosec
          - check:govulncheck
          - check:staticcheck
          - check:helmlint
          - test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # ratchet:jdx/mise-action@v4
      - run: mise run ${{ matrix.mise-task }}

  integration_test:
    permissions:
      contents: "read"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # ratchet:jdx/mise-action@v4
      - run: mise run test-integration

  bootstrap:
    if: github.ref == 'refs/heads/main'
    outputs:
      version: ${{ steps.build-push-sign-bootstrap.outputs.version }}
    needs:
      - checks
      - integration_test
    permissions:
      contents: "read"
      id-token: "write"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: nais/platform-build-push-sign@main # ratchet:exclude
        id: build-push-sign-bootstrap
        with:
          name: ${{ env.NAME }}-bootstrap
          google_service_account: gh-${{ env.NAME }}
          workload_identity_provider: ${{ secrets.NAIS_IO_WORKLOAD_IDENTITY_PROVIDER }}
          push: true

  helm:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - bootstrap
    outputs:
      version: ${{ steps.chart-version.outputs.version }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # ratchet:azure/setup-helm@v5
        name: "Setup Helm"
        with:
          version: "v4.1.1"

      - name: Update values.yaml with yq
        run: |-
          yq -i '.bootstrap.image.tag = "${{ needs.bootstrap.outputs.version }}"' charts/values.yaml
      - name: Build Chart
        run: |-
          sed -i "s/^version: .*/version: ${{ needs.bootstrap.outputs.version }}/g" charts/Chart.yaml
          helm package charts
      - name: "Authenticate to Google Cloud"
        id: "auth"
        uses: "google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093" # ratchet:google-github-actions/auth@v3
        with:
          workload_identity_provider: "${{ secrets.NAIS_IO_WORKLOAD_IDENTITY_PROVIDER }}"
          service_account: "gh-${{ env.NAME }}@nais-io.iam.gserviceaccount.com"
          token_format: "access_token"
      - name: "Login to registry"
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # ratchet:docker/login-action@v4
        with:
          registry: "europe-north1-docker.pkg.dev"
          username: "oauth2accesstoken"
          password: "${{ steps.auth.outputs.access_token }}"
      - name: Push Chart
        run: |-
          helm push ${{ env.NAME }}*.tgz ${{ env.FEATURE_REPOSITORY }}
      - name: Output chart version
        id: chart-version
        run: echo version=${{ needs.bootstrap.outputs.version }} >> $GITHUB_OUTPUT

  deploy:
    if: github.ref == 'refs/heads/main'
    needs:
      - helm
    runs-on: fasit-deploy
    permissions:
      id-token: write
    steps:
      - uses: nais/fasit-deploy@97187355184a7f0f4b7a36a2b49a86ce02240f7b # ratchet:nais/fasit-deploy@v4.0.0
        with:
          chart: ${{ env.FEATURE_REPOSITORY }}/${{ env.NAME }}
          version: ${{ needs.helm.outputs.version }}
          targets: |
            [
              { "target": { "kind": "management", "tenant": "ci-nais" }, "wait": true },
              { "target": { "kind": "management" } }
            ]
